<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - StorCLI RAID Monitor</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-main);
            margin: 0;
        }
        .login-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-lg), 0 0 40px rgba(99, 131, 255, 0.05);
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        .login-title {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient-header);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }
        .login-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 5px;
        }
        .error-msg {
            display: none;
            background: var(--status-critical-bg);
            border: 1px solid var(--status-critical-border);
            color: var(--status-critical);
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            margin-bottom: 20px;
            text-align: center;
        }
        .btn-full {
            width: 100%;
            justify-content: center;
            padding: 12px;
            font-size: 1rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <div class="login-icon">🛡️</div>
            <h1 class="login-title">RAID Monitor</h1>
            <div class="login-subtitle">Авторизация</div>
        </div>

        <div id="error-msg" class="error-msg"></div>

        <form id="login-form">
            <div class="form-group" style="margin-bottom: 16px;">
                <label for="username">Имя пользователя</label>
                <input type="text" id="username" placeholder="admin" required autofocus>
            </div>
            <div class="form-group" style="margin-bottom: 24px;">
                <label for="password">Пароль</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="btn-login">
                Войти
            </button>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const err = document.getElementById('error-msg');
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            btn.disabled = true;
            btn.textContent = 'Вход...';
            err.style.display = 'none';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                if (res.ok) {
                    window.location.href = '/';
                } else {
                    const data = await res.json();
                    err.textContent = data.detail?.message || 'Ошибка авторизации';
                    err.style.display = 'block';
                }
            } catch (error) {
                err.textContent = 'Ошибка соединения с сервером';
                err.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Войти';
            }
        });
    </script>
</body>
</html>
